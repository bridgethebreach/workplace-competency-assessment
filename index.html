function fmtTime(secs){var m=Math.floor(secs/60),s=secs%60;return(m>0?m+" min ":"")+s+" sec"+(s!==1?"s":"");}
function calcTimeMetrics(){
  var n=Qs.length,total=0;
  for(var i=0;i<n;i++){total+=(S.timeSpent[i]||0);}
  var avg=n?Math.round(total/n):0;
  return{totalTime:total,avgTime:avg,totalFmt:fmtTime(total),avgFmt:avg+" sec/question"};
}
function getTimeInsight(avgTimePerQ){
  if(avgTimePerQ<20){return"You completed scenarios very quickly, which suggests you may be relying on instinct rather than fully processing each situation. While intuition can be valuable, slowing down slightly to read and evaluate each scenario more deliberately may improve the quality of your decisions.";}
  else if(avgTimePerQ>=25&&avgTimePerQ<=40){return"Your pace reflects a balanced approach between speed and careful thinking. You are taking enough time to understand each scenario while maintaining decision efficiency. This is typically associated with strong, controlled judgment in real-world situations.";}
  else if(avgTimePerQ>40){return"You are spending more time than average on each scenario, which suggests careful and deliberate thinking. While this can improve accuracy, in fast-paced or high-pressure environments, developing quicker decision-making may be beneficial.";}
  else{return"Your timing pattern is slightly inconsistent. You may benefit from maintaining a steadier pace, ensuring each scenario receives enough attention without overthinking or rushing.";}
}
function calcScores(){
  var raw={},mx={};
  Object.keys(CM).forEach(function(k){raw[k]=0;mx[k]=0;});
  Qs.forEach(function(q,i){var a=S.answers[i]||{};q.comps.forEach(function(c){mx[c]=(mx[c]||0)+4;var s=0;if(a.most===q.most)s+=2;if(a.least===q.least)s+=2;raw[c]=(raw[c]||0)+s;});});
  var out={};
  Object.keys(CM).forEach(function(k){out[k]=mx[k]?Math.round((raw[k]/mx[k])*100):null;});
  var vs=[];Object.keys(out).forEach(function(k){if(out[k]!==null)vs.push(out[k]);});
  out._ov=vs.length?Math.round(vs.reduce(function(a,b){return a+b;},0)/vs.length):0;
  return out;
}
function getFBText(fbId, keys){
  var fq=FBQs.filter(function(q){return q.id===fbId;})[0];
  if(!fq||!keys||!keys.length)return"";
  if(typeof keys==="string")return keys; // open text
  return keys.map(function(k){
    var opt=fq.opts&&fq.opts.filter(function(o){return o.k===k;})[0];
    return opt?opt.v:k;
  }).join("; ");
}

  fq.opts.forEach(function(o){var s=pk.indexOf(o.k)>-1;rows+='<div id="fr'+o.k+'" class="fb-row'+(s?" fbsel":"")+'" onclick="fbPick(\''+o.k+'\')" style="cursor:pointer"><div id="fl'+o.k+'" class="fb-ltr" style="background:'+(s?"#d96e14":"#f1801c")+'">'+o.k+'</div><div class="fb-txt">'+o.v+'</div></div>';});

}

function rLoad(){
  return'<div class="card load-wrap"><h2>Feedback Gotten. Thank You!</h2><div class="spinner"></div><div class="load-bar"><div class="load-fill"></div></div><p class="load-cap">Computing your competency report...</p><button id="vbtn" class="view-btn" style="display:none" onclick="showRes()">View My Results</button></div>';

// CHANGE 5: Level ladder — removed the two subtitle lines beneath it
function rLevelLadder(score){
  var idx=sLvlIdx(score);
  var html='<div class="level-ladder">';
  LEVELS.forEach(function(lv,i){
    var isActive=(i===idx);
    var isPassed=(i<idx);
    if(i>0){html+='<div class="ll-connector'+(isPassed||isActive?' passed':'')+'"></div>';}
    html+='<div class="ll-step">';
    html+='<div class="ll-dot'+(isActive?' active':isPassed?' passed':'')+'">'+lv.label.charAt(0)+'</div>';
    html+='<div class="ll-name'+(isActive?' active':'')+'">'+lv.label+'</div>';
    html+='</div>';
  });
  html+='</div>';
  // REMOVED: the two subtitle lines ("Your current level is highlighted · Levels progress left to right")
  return html;
}

// PDF helper: draw watermark on current page
function pdfWatermark(doc,pw){
  doc.saveGraphicsState();
  doc.setGState(new doc.GState({opacity:0.05}));
  doc.setFont("helvetica","bold");doc.setFontSize(38);doc.setTextColor("#f1801c");
  for(var wy=40;wy<300;wy+=80){doc.text("Bridge the Breach",pw/2,wy,{align:"center",angle:35});}
  doc.restoreGraphicsState();
}

function dlPDF(){
  var jsPDF=window.jspdf.jsPDF,doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"}),ml=15,pw=210,cw=pw-30,y=0;
  var sc=S.scores,ov=sc._ov,dt=new Date().toLocaleDateString("en-NG",{year:"numeric",month:"long",day:"numeric"}),oc=sCol(ov),lv=sLvl(ov),ti=sTier(ov);
  var om={
    high:"Overall: "+ov+"% ("+lv+"). Your score reflects genuine behavioral competency. You demonstrate professional judgment and self-awareness in complex workplace situations. Your dimension breakdown shows precisely where to focus to move from strong to exceptional.",
    mid:"Overall: "+ov+"% ("+lv+"). Your score reflects real capability alongside clear behavioral patterns that can be strengthened. These are not character issues. They are patterns, and patterns change with deliberate practice. Your dimension breakdown gives you a precise picture of where to focus.",
    low:"Overall: "+ov+"% ("+lv+"). This result is not a verdict on your potential. It is an honest picture of where your behavioral instincts currently sit. Every competency below can be developed. Your dimension breakdown tells you exactly where to start."
  };

  // WATERMARK — first page
  pdfWatermark(doc,pw);

  // HEADER
  doc.setFillColor("#f1801c");doc.rect(0,0,pw,22,"F");
  doc.setFont("helvetica","bold");doc.setFontSize(14);doc.setTextColor("#ffffff");doc.text(CO_NAME,ml,12);
  doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.text("Workplace Competency Assessment Report",ml,19);doc.text(dt,pw-15,12,{align:"right"});y=27;

  // LEARNER
  doc.setFillColor("#f7f6f2");doc.roundedRect(ml,y,cw,18,2,2,"F");
  doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor("#1a1a1a");doc.text(S.lead.name||"",ml+4,y+7);
  doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor("#555");
  var il=[S.lead.org,S.lead.plevel||"",S.lead.gender,S.lead.age?"Age: "+S.lead.age:""].filter(function(x){return x;}).join("  |  ");
  doc.splitTextToSize(il,cw-8).forEach(function(ln,i){doc.text(ln,ml+4,y+13+(i*4));});y+=23;

  // OVERALL
  var omL=doc.splitTextToSize(om[ti],cw-30),obH=Math.max(24,8+(omL.length*4.5)+4);
  doc.setFillColor("#f7f6f2");doc.roundedRect(ml,y,cw,obH,2,2,"F");
  doc.setFillColor(oc.bg);doc.circle(ml+13,y+(obH/2),10,"F");
  doc.setFont("helvetica","bold");doc.setFontSize(14);doc.setTextColor(oc.txt);doc.text(ov+"%",ml+13,y+(obH/2)+2,{align:"center"});
  doc.setFont("helvetica","normal");doc.setFontSize(7);doc.setTextColor("#888");doc.text(lv,ml+13,y+(obH/2)+7,{align:"center"});
  doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor("#1a1a1a");doc.text("Overall Competency Score",ml+27,y+7);
  doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor("#333");
  var omy=y+13;omL.forEach(function(ln){doc.text(ln,omy===y+13?ml+27:ml+27,omy);omy+=4.5;});y+=obH+4;

  // LEVEL LADDER in PDF — CHANGE 5: no subtitle text in PDF either (already wasn't rendering, keeping consistent)
  var ladderH=16,ladderY=y;
  if(y+ladderH>282){doc.addPage();pdfWatermark(doc,pw);y=15;ladderY=y;}
  doc.setFillColor("#f7f6f2");doc.roundedRect(ml,ladderY,cw,ladderH,2,2,"F");
  doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor("#f1801c");
  doc.text("COMPETENCY LEVELS",ml+4,ladderY+5);
  var stepW=(cw-8)/LEVELS.length,lvIdx=sLvlIdx(ov);
  LEVELS.forEach(function(lev,i){
    var cx=ml+4+(i*stepW)+(stepW/2);
    var isAct=(i===lvIdx),isPast=(i<lvIdx);
    if(isAct){doc.setFillColor("#f1801c");}else if(isPast){doc.setFillColor("#fad4ad");}else{doc.setFillColor("#e0e0e0");}
    doc.circle(cx,ladderY+9,2.5,"F");
    doc.setFont("helvetica",isAct?"bold":"normal");
    doc.setFontSize(isAct?6.5:6);
    doc.setTextColor(isAct?"#f1801c":isPast?"#555":"#999");
    doc.text(lev.label,cx,ladderY+14.5,{align:"center"});
    if(i<LEVELS.length-1){
      var lineX=cx+2.5,nextCx=ml+4+((i+1)*stepW)+(stepW/2)-2.5;
      doc.setDrawColor(isPast?"#fad4ad":"#e0e0e0");doc.setLineWidth(.5);
      doc.line(lineX,ladderY+9,nextCx,ladderY+9);
    }
  });
  y+=ladderH+5;

  // TIME & BEHAVIOURAL INSIGHT
  var tm=calcTimeMetrics(),tmInsight=getTimeInsight(tm.avgTime);
  var insightLines=doc.setFont("helvetica","normal").setFontSize(8.5)&&doc.splitTextToSize(tmInsight,cw-14);
  var tiH=7+6+6+(insightLines.length*5)+6;
  if(y+tiH>282){doc.addPage();pdfWatermark(doc,pw);y=15;}
  doc.setFillColor("#f7f6f2");doc.roundedRect(ml,y,cw,tiH,2,2,"F");
  doc.setFillColor("#f1801c");doc.roundedRect(ml,y,2.5,tiH,0,0,"F");
  doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor("#f1801c");
  doc.text("TIME & BEHAVIOURAL INSIGHT",ml+6,y+5.5);
  doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor("#555");
  doc.text("Total Time: "+tm.totalFmt+"   |   Average Per Question: "+tm.avgFmt,ml+6,y+12);
  doc.setFontSize(8.5);doc.setTextColor("#333");
  var tiy=y+20;
  insightLines.forEach(function(ln){doc.text(ln,ml+6,tiy);tiy+=5;});
  y+=tiH+5;
  Object.keys(CM).forEach(function(k){
    var m=CM[k],v=sc[k];if(v===null||v===undefined)return;
    var c=sCol(v),t=sTier(v),f=m[t];doc.setFontSize(8.5);
    var nL=doc.splitTextToSize(f.note,cw-8),aL=doc.splitTextToSize(f.action,cw-14);
    var abH=7+(aL.length*4.5)+6,ch=9+5+4+(nL.length*4.5)+5+abH+5;
    if(y+ch>282){doc.addPage();pdfWatermark(doc,pw);y=15;}
    doc.setDrawColor("#e0e0e0");doc.setLineWidth(.4);doc.roundedRect(ml,y,cw,ch,2,2,"S");
    doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor("#1a1a1a");doc.text(m.label,ml+4,y+8);
    var pw2=18,px=ml+cw-pw2-4;
    doc.setFillColor(c.pill);doc.roundedRect(px,y+2,pw2,7,2,2,"F");
    doc.setFont("helvetica","bold");doc.setFontSize(8.5);doc.setTextColor(c.pt);doc.text(v+"%",px+pw2/2,y+7.2,{align:"center"});
    var barY=y+11;doc.setFillColor("#eee");doc.roundedRect(ml+4,barY,cw-8,2.5,1,1,"F");
    if(v>0){doc.setFillColor(c.bar);doc.roundedRect(ml+4,barY,Math.max(1,(cw-8)*v/100),2.5,1,1,"F");}
    var ty=barY+8;doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor("#333");
    nL.forEach(function(ln){doc.text(ln,ml+4,ty);ty+=4.5;});ty+=4;
    doc.setFillColor("#f7f6f2");doc.roundedRect(ml+4,ty,cw-8,abH,2,2,"F");
    doc.setFillColor("#f1801c");doc.roundedRect(ml+4,ty,2.5,abH,0,0,"F");
    doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor("#f1801c");doc.text("DEVELOPMENT FOCUS",ml+10,ty+5.5);
    doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor("#1a1a1a");
    var ay=ty+11;aL.forEach(function(ln){doc.text(ln,ml+10,ay);ay+=4.5;});
    y+=ch+4;
  });

  // FOOTER
  if(y>272){doc.addPage();pdfWatermark(doc,pw);y=15;}y+=4;
  doc.setDrawColor("#f1801c");doc.setLineWidth(.8);doc.line(ml,y,ml+cw,y);y+=6;
  doc.setFont("helvetica","bold");doc.setFontSize(11);doc.setTextColor("#f1801c");doc.text(CO_NAME,ml,y);y+=5;
  doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor("#555");
  doc.text("We help organizations build the conditions for sustained high performance and develop the people who work within those conditions.",ml,y);y+=5;
  doc.setTextColor("#888");doc.text("Performance Consulting  |  Competency Development  |  Corporate Training",ml,y);y+=5;
  doc.setTextColor("#999");doc.text(CO_WEB+"  |  "+CO_EMAIL,ml,y);

  doc.save("BTB-Workplace-Competency-Report-"+(S.lead.name||"Report").replace(/\s+/g,"-")+".pdf");
}

function startA(){
  // CHANGE 6: Reshuffle questions every time the assessment starts
  Qs=shuffle(QsSource);
  S.screen="countdown";S.cdNum=3;go();
  var t=setInterval(function(){
    S.cdNum--;
    if(S.cdNum<0){clearInterval(t);S.screen="question";S.qi=0;go();startTimer();}
    else go();
  },1000);
}
